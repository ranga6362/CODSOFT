<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Grid Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator-wrapper">
        <div class="calculator">
            <div class="display-container">
                <input type="text" id="result" placeholder="0" readonly>
            </div>

            <div class="grid-container">
                <button class="btn btn-clear" id="clear">C</button>
                <button class="btn btn-op" value="/">/</button>
                <button class="btn btn-op" value="*">×</button>
                <button class="btn btn-op" value="-">-</button>

                <button class="btn btn-num" value="7">7</button>
                <button class="btn btn-num" value="8">8</button>
                <button class="btn btn-num" value="9">9</button>
                <button class="btn btn-op" value="+">+</button>

                <button class="btn btn-num" value="4">4</button>
                <button class="btn btn-num" value="5">5</button>
                <button class="btn btn-num" value="6">6</button>
                <button class="btn btn-equal" id="equals">=</button>

                <button class="btn btn-num" value="1">1</button>
                <button class="btn btn-num" value="2">2</button>
                <button class="btn btn-num" value="3">3</button>
                
                <button class="btn btn-num btn-zero" value="0">0</button>
                <button class="btn btn-num" value=".">.</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
